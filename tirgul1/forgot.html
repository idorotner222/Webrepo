<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link href="https://unpkg.com/tailwindcss@^2/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen m-0">
    <div class="bg-white p-8 rounded-lg shadow-xl w-80 text-center">
        <h1 class="text-2xl font-bold mb-4 text-gray-800">Reset Password</h1>
        <p class="text-gray-600 mb-6 text-sm">Enter your email to receive a reset link.</p>
        <form>
            <input type="email" placeholder="Enter your email" required 
                   class="w-full p-2 mb-4 border border-gray-300 rounded focus:ring-2 focus:ring-blue-400 outline-none text-left">
            
            <button type="submit" class="w-full p-3 bg-blue-500 text-white rounded hover:bg-blue-600 transition">
                Send Link
            </button>
            
            <a href="login.html" class="block mt-4 text-blue-500 hover:underline text-sm">
                Return to Login
            </a>
        </form>
    </div>
</body>
</html>
